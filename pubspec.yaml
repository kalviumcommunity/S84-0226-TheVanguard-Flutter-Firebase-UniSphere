name: unisphere
description: "A centralized platform for college clubs and student communities."
publish_to: 'none'

version: 1.0.0+1

environment:
sdk: ^3.11.0

# ═══════════════════════════════════════════════════════════════

# DEPENDENCIES

# ═══════════════════════════════════════════════════════════════

dependencies:
flutter:
sdk: flutter

# UI & Icons

cupertino_icons: ^1.0.8

# State Management

provider: ^6.1.2

# Firebase

firebase_core: ^3.0.0
firebase_auth: ^5.0.0
cloud_firestore: ^5.0.0

# Environment variables

flutter_dotenv: ^5.2.1

# ═══════════════════════════════════════════════════════════════

# DEV DEPENDENCIES

# ═══════════════════════════════════════════════════════════════

dev_dependencies:
flutter_test:
sdk: flutter

# Linting

flutter_lints: ^6.0.0

# ═══════════════════════════════════════════════════════════════

# FLUTTER CONFIGURATION

# ═══════════════════════════════════════════════════════════════

flutter:

uses-material-design: true

# Assets

assets:
- .env
# - assets/images/
# - assets/icons/

# Fonts (optional)

# fonts:

# - family: Schyler

# fonts:

# - asset: fonts/Schyler-Regular.ttf

# - asset: fonts/Schyler-Italic.ttf

# style: italic
