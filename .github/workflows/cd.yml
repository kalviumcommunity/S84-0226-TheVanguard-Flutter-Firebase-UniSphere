name: Continuous Deployment

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get
        
      # Note: To sign the app properly in production, set up your keystore via secrets
      # and run base64 decode before building. We build a generic release apk for now.
      - name: Build Release APK
        run: flutter build apk --release
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-and-release-ios:
    name: Build iOS Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get
        
      # Note: For production iOS releases, you need provisioning profiles and certificates
      # configured securely. We build unsigned IPA/app for demonstration here.
      - name: Build Release iOS App
        run: flutter build ios --release --no-codesign
        
      # To package into IPA without codesign is tricky natively, compression is an alternative
      - name: Compress iOS App
        run: cd build/ios/iphoneos && tar -czf ios-release.zip Runner.app
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: release-ios
          path: build/ios/iphoneos/ios-release.zip

  create-github-release:
    name: Create GitHub Release
    needs: [build-and-release-android, build-and-release-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all builds
        uses: actions/download-artifact@v3
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/release-apk/app-release.apk
            artifacts/release-ios/ios-release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
